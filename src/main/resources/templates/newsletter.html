<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resumen de Noticias - Symplifica</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f6f9; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #0056b3; padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { color: #0056b3; }
        .content { line-height: 1.6; font-size: 16px; }
        .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #888; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗞️ Tu Resumen Diario de Noticias</h1>
        </div>
        <div class="content">
            <p>Hola,</p>
            <p>Aquí tienes un resumen generado especialmente para ti sobre las últimas tendencias en entretenimiento:</p>
            
            <div style="background-color: #f9fafb; padding: 15px; border-radius: 6px; border-left: 4px solid #0056b3;">
                {{SUMMARY_CONTENT}}
            </div>
            
            <p style="margin-top:20px;">¡Que tengas un excelente día!</p>
        </div>
        <div class="footer">
            Generado automáticamente a través de Ollama LLM • Symplifica Backend Prueba Técnica
        </div>
    </div>
</body>
</html>
